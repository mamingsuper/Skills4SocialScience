---
layout: default
---
<div class="detail-header">
    <div class="hero-badge">📄 Academic Paper</div>
    <h1 class="detail-title">{{ page.title }}</h1>
    <p class="detail-description">{{ page.description }}</p>

    <div class="detail-meta">
        <span class="meta-tag">📅 Year: {{ page.year }}</span>
        <span class="meta-tag">🏷️ Category: {{ page.category }}</span>
    </div>

    <div class="detail-actions">
        <a href="{{ page.link }}" target="_blank" rel="noopener noreferrer" class="btn btn-primary">Read Paper (PDF/Web) →</a>
    </div>
</div>

<div class="detail-content">
    {{ content }}
</div>
